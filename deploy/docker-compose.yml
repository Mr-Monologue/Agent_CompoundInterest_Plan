services:
  investor-core:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      INVESTOR_HOST: 0.0.0.0
      INVESTOR_DB_PATH: /data/investor.db
    command:
      - /bin/sh
      - -c
      - uv run alembic upgrade head && exec uv run investor-core
    ports:
      - "127.0.0.1:8710:8710"
    volumes:
      - ../data:/data
    healthcheck:
      test:
        - CMD
        - uv
        - run
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8710/ready', timeout=3)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

