name: Publish release branch version

on:
  push:
    branches: [release]
    paths: [release-manifest.json]

permissions:
  contents: read

jobs:
  publish:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync --locked --all-extras --python 3.11
      - run: uv run pytest
      - run: uv run ruff check .
      - run: uv run mypy src
      - id: version
        name: Verify project version and release manifest agree
        shell: python {0}
        run: |
          import json
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          manifest = json.loads(Path("release-manifest.json").read_text(encoding="utf-8"))
          version = project["project"]["version"]
          expected_tag = f"v{version}"
          if manifest["version"] != version:
              raise SystemExit("release-manifest.json does not match pyproject.toml")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"tag={expected_tag}\n")
      - name: Create the governed tag and release once
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "$RELEASE_TAG already exists; no mutation required."
            exit 0
          fi
          gh release create "$RELEASE_TAG" \
            --target "$GITHUB_SHA" \
            --title "Value DCA Agent $RELEASE_TAG" \
            --generate-notes
