name: Publish v0.5.0

on:
  push:
    branches: [main]
    paths: [release-manifest.json]

permissions:
  contents: read

jobs:
  publish-v0-5-0:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          python-version: "3.11"
      - run: uv sync --locked --all-extras --python 3.11
      - run: uv run pytest
      - run: uv run ruff check .
      - run: uv run mypy src
      - id: version
        shell: python {0}
        run: |
          import json
          import os
          import tomllib
          from pathlib import Path

          project = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          manifest = json.loads(Path("release-manifest.json").read_text(encoding="utf-8"))
          version = project["project"]["version"]
          if manifest["version"] != version:
              raise SystemExit("release-manifest.json does not match pyproject.toml")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as output:
              output.write(f"tag=v{version}\n")
      - name: Verify pushed tag matches the governed release version
        env:
          EXPECTED_TAG: ${{ steps.version.outputs.tag }}
        run: test "$EXPECTED_TAG" = "v0.5.0"
      - name: Publish the explicitly authorized v0.5.0 release once
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view v0.5.0 >/dev/null 2>&1; then
            echo "v0.5.0 already exists; no mutation required."
            exit 0
          fi
          gh release create v0.5.0 \
            --target "$GITHUB_SHA" \
            --title "Value DCA Agent v0.5.0" \
            --generate-notes
